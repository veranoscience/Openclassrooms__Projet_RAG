<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puls-Events — Assistant culturel Paris</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* Header */
    .header {
      background: #6c47ff;
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon { font-size: 28px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    .bubble.user {
      align-self: flex-end;
      background: #6c47ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .bubble.bot.loading { color: #888; font-style: italic; }

    /* Event cards */
    .events {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .event-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: 4px solid #6c47ff;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
    }
    .event-card .event-title {
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .event-card .event-meta {
      color: #666;
      font-size: 12px;
      line-height: 1.6;
    }
    .event-card a {
      color: #6c47ff;
      text-decoration: none;
      font-size: 12px;
    }
    .event-card a:hover { text-decoration: underline; }

    /* Input */
    .input-area {
      border-top: 1px solid #e8e8e8;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      background: #fff;
    }
    .input-area input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #6c47ff; }
    .input-area button {
      background: #6c47ff;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .input-area button:hover  { background: #5535d4; }
    .input-area button:disabled { background: #ccc; cursor: default; }

    /* Suggestions */
    .suggestions {
      padding: 0 20px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .suggestion {
      background: #f0ecff;
      color: #6c47ff;
      border: 1px solid #d4c8ff;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .suggestion:hover { background: #e2d9ff; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-icon">🎭</span>
    <div>
      <h1>Puls-Events</h1>
      <p>Assistant événements culturels · Paris</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="bubble bot">
      Bonjour ! Je suis votre assistant culturel pour Paris. Posez-moi une question sur les événements (concerts, théâtre, expositions…) 🎶
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <span class="suggestion" onclick="sendSuggestion(this)">Concerts jazz en janvier 2026</span>
    <span class="suggestion" onclick="sendSuggestion(this)">Théâtre en mai 2026</span>
    <span class="suggestion" onclick="sendSuggestion(this)">Art contemporain en 2026</span>
    <span class="suggestion" onclick="sendSuggestion(this)">Événements gratuits à Paris</span>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Ex : Quels concerts jazz à Paris en janvier 2026 ?" />
    <button id="send-btn" onclick="send()">➤</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");

  inputEl.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

  function sendSuggestion(el) {
    inputEl.value = el.textContent;
    send();
  }

  function appendBubble(text, role, extra = "") {
    const div = document.createElement("div");
    div.className = `bubble ${role}`;
    div.innerHTML = text + extra;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function formatDate(iso) {
    if (!iso) return "";
    try {
      return new Date(iso).toLocaleDateString("fr-FR", {
        day: "numeric", month: "long", year: "numeric"
      });
    } catch { return iso; }
  }

  function buildEventCards(events) {
    if (!events || events.length === 0) return "";
    const cards = events.map(e => `
      <div class="event-card">
        <div class="event-title">${e.title || "Sans titre"}</div>
        <div class="event-meta">
          📅 ${formatDate(e.start)}${e.end && e.end !== e.start ? " → " + formatDate(e.end) : ""}<br>
          📍 ${[e.location_name, e.location_address, e.city].filter(Boolean).join(" · ")}
          ${e.lien ? `<br><a href="${e.lien}" target="_blank">🔗 Voir l'événement</a>` : ""}
        </div>
      </div>`).join("");
    return `<div class="events">${cards}</div>`;
  }

  async function send() {
    const question = inputEl.value.trim();
    if (!question) return;

    inputEl.value = "";
    sendBtn.disabled = true;
    document.getElementById("suggestions").style.display = "none";

    appendBubble(question, "user");
    const loadingEl = appendBubble("…", "bot loading");

    try {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, top_k: 80, max_events: 5 }),
      });
      const data = await res.json();
      loadingEl.className = "bubble bot";
      if (data.events && data.events.length > 0) {
        const intro = document.createElement("p");
        intro.textContent = data.answer;
        loadingEl.innerHTML = "";
        loadingEl.appendChild(intro);
        loadingEl.insertAdjacentHTML("beforeend", buildEventCards(data.events));
      } else {
        loadingEl.textContent = data.answer;
      }
    } catch (err) {
      loadingEl.className = "bubble bot";
      loadingEl.textContent = "Erreur de connexion à l'API.";
    } finally {
      sendBtn.disabled = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
